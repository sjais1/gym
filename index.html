<script type="text/babel" data-presets="react">
/* Screens: Historique (liste + détail) · Commentaire (Focus) · Stats (masse soulevée) */

function synthHistory(curWeight){
  if (!curWeight || curWeight<=0) curWeight = 40;
  const dates=['4 juin','28 mai','21 mai','14 mai','7 mai','30 avr'];
  let w = curWeight;
  return dates.map((d,i)=>{
    const top = w;
    const sets = [ {reps:10,w:top},{reps:10,w:top},{reps:i===0?9:10,w:i===0?top-2.5:top},{reps:10,w:top} ];
    const note = ['Dernière série de réserve.','Propre, prêt à monter.','','Bonne forme.','Reprise.',''][i];
    w = +(w - (i%2?2.5:0)).toFixed(1);
    return { date:d, top, sets, note };
  });
}

/* ---- Historique : liste d'exercices (onglet) ---- */
function HistoryListScreen({ ctx }) {
  const { program, dayColor, push } = ctx;
  const days = Object.keys(program.days);
  return (
    <div className="screen">
      <div className="safe-top" />
      <div className="pad col" style={{ gap:4 }}>
        <span className="kicker">Historique & progression</span>
        <h1 className="h1" style={{ fontSize:34 }}>Mes exercices</h1>
      </div>
      <div className="pad col" style={{ gap:18, marginTop:18 }}>
        {days.map(k=>(
          <div key={k} className="col" style={{ gap:9, '--acc':dayColor(k) }}>
            <div className="row" style={{ gap:8 }}><span className="dot"/><span className="lbl">{dayLabelFR(k)} · {program.days[k].focus}</span></div>
            {program.days[k].exercises.slice(0,4).map((e,i)=>(
              <button key={e.id} className="sp-row tap" style={{ width:'100%', textAlign:'left' }} onClick={()=>push('historyEx',{name:e.name, weight:e.weight, day:k})}>
                <span className="bar"/><span className="nm">{e.name}</span>
                <span className="num muted" style={{ fontSize:12 }}>{e.bw?'PdC':GYM.fmtKg(e.weight)}</span>
                <Icon n="fwd" s={16} c="var(--muted)"/>
              </button>))}
          </div>))}
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

/* ---- Détail d'un exercice (Spectrum timeline) ---- */
function HistoryExScreen({ ctx, params }) {
  const { pop, push, dayColor } = ctx;
  const acc = dayColor(params.day||ctx.today);
  const base = synthHistory(params.weight);
  const userNotes = (ctx.notes[params.name]||[]).map(n=>({ date:n.date, top:params.weight, sets:[], note:n.note }));
  const hist = [...userNotes, ...base];
  const withSets = hist.filter(h=>h.sets.length);
  const tops = withSets.map(h=>h.top).reverse();
  const min=Math.min(...tops), max=Math.max(...tops), rng=max-min||1;
  const delta = (tops[tops.length-1]-tops[0]);

  return (
    <div className="screen" style={{ '--acc':acc }}>
      <div className="sp-head">
        <div style={{ position:'absolute', top:54, left:16 }}>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={pop}><Icon n="back" s={20}/></button>
        </div>
        <div className="hk">HISTORIQUE</div>
        <div className="ht">{params.name}</div>
        <div className="hpills">
          <span className="hpill">{hist.length} séances</span>
          <span className="hpill" style={{ background:'rgba(10,11,13,.82)', color:'var(--good)' }}>↗ +{GYM.fmtKg(delta)} kg</span>
        </div>
      </div>

      {/* mini courbe des charges max */}
      <div className="pad" style={{ marginTop:16 }}>
        <div className="card" style={{ padding:14 }}>
          <span className="kicker">Charge max · 6 séances</span>
          <div className="bars" style={{ height:74, marginTop:10 }}>
            {tops.map((v,i)=><i key={i} style={{ height:(28+(v-min)/rng*72)+'%', opacity:i===tops.length-1?1:.55 }}/>)}
          </div>
        </div>
      </div>

      <div className="pad col" style={{ gap:0, marginTop:14 }}>
        {hist.map((h,i)=>(
          <div key={i} className="row" style={{ gap:12, paddingBottom:14, alignItems:'flex-start' }}>
            <div className="col" style={{ alignItems:'center' }}>
              <span style={{ width:11, height:11, borderRadius:'50%', background:i===0?'var(--acc)':'var(--line2)', marginTop:4 }}/>
              {i<hist.length-1 && <span style={{ flex:1, width:2, background:'var(--line)', minHeight:34 }}/>}
            </div>
            <div className="col grow" style={{ gap:6 }}>
              {/* poids justifiés gauche/droite, 2 décimales */}
              <div className="between">
                <span style={{ fontWeight:600, fontSize:13.5 }}>{h.date}</span>
                <span className="num" style={{ fontWeight:700, fontSize:14, color:'var(--acc)' }}>{GYM.fmtKg(h.top)} kg</span>
              </div>
              <div className="row" style={{ gap:6, flexWrap:'wrap' }}>
                {h.sets.map((s,si)=><span key={si} className="chip" style={{ height:22, fontSize:10.5 }} title={'série '+(si+1)}>
                  <span className="num">{s.reps}</span>×<span className="num">{GYM.fmtKg(s.w)}</span></span>)}
              </div>
              {h.note && <div className="muted" style={{ fontSize:11.5, lineHeight:1.35 }}>« {h.note} »</div>}
            </div>
          </div>))}
      </div>

      <div className="pad" style={{ paddingBottom:10 }}>
        <button className="btn btn-acc" onClick={()=>push('comment',{name:params.name, day:params.day})}><Icon n="edit" s={18} c="var(--on-acc)"/> Ajouter une note</button>
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

/* ---- Saisie de commentaire (Focus) ---- */
function CommentScreen({ ctx, params }) {
  const { pop, dayColor } = ctx;
  const acc = dayColor(params.day||ctx.today);
  const [txt, setTxt] = React.useState('');
  const chips = ['Facile','À la limite','Douleur','Forme top','Monter la charge','Garder'];
  const recent = (ctx.notes[params.name]||synthHistory(60)).slice(0,2);

  return (
    <div className="screen" style={{ '--acc':acc }}>
      <div className="safe-top" />
      <div className="pad col grow" style={{ gap:0 }}>
        <div className="between">
          <BackBtn onClick={pop} label="Annuler" />
          <button className="btn" style={{ background:'none', color:'var(--acc)', fontWeight:700, fontSize:14 }}
            onClick={()=>{ ctx.addNote(params.name, txt); pop(); }}>Enregistrer</button>
        </div>
        <span className="kicker" style={{ marginTop:14, color:'var(--acc)' }}>Note · {params.name}</span>
        <h1 className="h1" style={{ fontSize:30, marginTop:6 }}>Comment<br/>c’était ?</h1>

        <textarea value={txt} onChange={e=>setTxt(e.target.value)} autoFocus
          placeholder="Sensations, douleurs, réglages machine…"
          style={{ marginTop:18, minHeight:120, background:'var(--surface)', border:'1.5px solid var(--line2)', borderRadius:16,
            padding:14, color:'var(--fg)', font:'inherit', fontSize:15, resize:'none', outline:'none' }} />

        <div className="row" style={{ gap:7, flexWrap:'wrap', marginTop:14 }}>
          {chips.map(c=><button key={c} className="chip ghost tap" onClick={()=>setTxt(t=> (t?t+' ':'')+c.toLowerCase())}>{c}</button>)}
        </div>

        <div className="grow" />
        <span className="kicker" style={{ marginTop:18 }}>Notes récentes</span>
        <div className="divider" style={{ margin:'10px 0' }} />
        {recent.filter(r=>r.note).map((r,i)=><div key={i} className="fg2" style={{ fontSize:12.5, marginBottom:8 }}>
          <span className="num muted">{r.date}</span> · « {r.note} »</div>)}
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

const MOIS_FR = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const shortDateFR = (iso)=>{ const d=new Date(iso); return d.getDate()+' '+MOIS_FR[d.getMonth()]; };

/* ---- Stats : masse totale soulevée par période ---- */
function StatsScreen({ ctx }) {
  const acc = ctx.dayColor(ctx.today);
  const [period, setPeriod] = React.useState('semaine');
  const realByDate = {}; Object.keys(ctx.sessionLog||{}).forEach(iso=>{ realByDate[iso] = ctx.sessionLog[iso].volume; });
  const realSession = ctx.todayComplete ? ctx.loggedTodayVolume : GYM.dayVolume(ctx.program.days[ctx.today]);
  const realWeek = GYM.weekVolume(ctx.program);

  let agg;
  if (period==='séance') {
    // progression de CE type de séance (mêmes jours, ex. les jambes) — comparaison like-for-like
    const same = GYM.SESSIONS.filter(s=>s.day===ctx.today).slice(-7)
      .map(s=>({ label: shortDateFR(s.dateISO), value: (realByDate[s.dateISO]!=null?realByDate[s.dateISO]:s.volume) }));
    if (same.length) same[same.length-1] = { label:'auj.', value: realSession };
    const prev = same.length>=2 ? same[same.length-2].value : null;
    agg = { points: same, last: realSession, total: same.reduce((s,p)=>s+p.value,0), deltaPct: prev?Math.round(((realSession-prev)/prev)*100):0 };
  } else {
    agg = GYM.aggregate(period, realByDate);
    if (period==='semaine') {
      if (agg.points.length) agg.points = agg.points.map((p,i)=> i===agg.points.length-1 ? {...p, value: realWeek} : p);
      agg.last = realWeek;
      agg.total = agg.points.reduce((s,p)=>s+p.value,0);
      const prev = agg.points[agg.points.length-2] && agg.points[agg.points.length-2].value;
      agg.deltaPct = prev ? Math.round(((realWeek-prev)/prev)*100) : 0;
    }
  }
  const max = Math.max(...agg.points.map(p=>p.value),1);
  const periodWord = { 'séance':'cette séance','semaine':'cette semaine','mois':'ce mois','année':'cette année' }[period];

  return (
    <div className="screen" style={{ '--acc':acc }}>
      <div className="sp-head" style={{ paddingBottom:20 }}>
        <div className="hk">MASSE TOTALE SOULEVÉE</div>
        <div className="ht num" style={{ fontSize:46 }}>{GYM.fmtTon(agg.last)}</div>
        <div className="hpills">
          <span className="hpill">{periodWord}</span>
          <span className="hpill" style={{ background:'rgba(10,11,13,.82)', color: agg.deltaPct>=0?'var(--good)':'var(--d-ven)' }}>
            {agg.deltaPct>=0?'↗ +':'↘ '}{agg.deltaPct}% {period==='séance'?'vs séance préc.':((period==='mois'||period==='année')?'vs même période N-1':'vs précédent')}</span>
        </div>
      </div>

      <div className="pad col" style={{ gap:14, marginTop:16 }}>
        <Seg value={period} onChange={setPeriod} options={[
          {value:'séance',label:'Séance'},{value:'semaine',label:'Semaine'},{value:'mois',label:'Mois'},{value:'année',label:'Année'}]} />

        <div className="card" style={{ padding:'16px 14px 12px' }}>
          <div className="bars">
            {agg.points.map((p,i)=>(

          <div className="card" style={{ flex:1, padding:14 }}><div className="row" style={{ gap:6 }}><Icon n="trend" s={16} c="var(--good)"/><span className="kicker">Record · Squat</span></div>
            <div className="stat-big num" style={{ fontSize:24, marginTop:8 }}>65,00</div></div>

function NewProgramScreen({ ctx }) {
  const { pop, addProgram } = ctx;
  const [step, setStep] = React.useState(0);
  const [name, setName] = React.useState('');
  const [goal, setGoal] = React.useState('Hypertrophie');
  const [weeks, setWeeks] = React.useState(10);
  const [days, setDays] = React.useState(4);
  const acc = 'var(--d-mar)';

  const create = ()=>{
    const id = 'prog-'+Date.now();
    const tmplKeys = ['lun','mar','mer','jeu','ven'];
    const splits = {
      3:[['Push','ÉPAULES'],['Pull','DOS'],['Jambes','JAMBES']],
      4:[['Haut A','PECS'],['Bas A','JAMBES'],['Haut B','DOS'],['Bas B','JAMBES']],
      5:[['Épaules','ÉPAULES'],['Pectoraux','PECS'],['Dos','DOS'],['Jambes','JAMBES'],['HIIT','HIIT']],
    }[days];
    const newDays = {};
    splits.forEach((sp,i)=>{
      const srcKey = tmplKeys[i] || 'jeu';
      const src = GYM.PHASE1.days[srcKey];
      newDays[tmplKeys[i]] = { focus:sp[0], group:sp[1], exercises: src.exercises.slice(0,5).map(e=>GYM.ex(e.name,e.setsN,e.reps,e.weight,e.rest,e.last,{unit:e.unit,bw:e.bw,target:e.target})) };
    });
    addProgram({ id, name:(name||'Nouveau programme')+' — '+goal, weeks, currentWeek:1, days:newDays });
    ctx.switchProgram(id); ctx.goTab('home');
  };

  return (
    <div className="screen" style={{ '--acc':acc }}>
      <div className="safe-top" />
      <div className="pad between"><BackBtn onClick={()=> step>0?setStep(step-1):pop()} label={step>0?'Retour':'Annuler'} />

        {step===1 && <div className="col fade-up" style={{ gap:22 }}>
          <h1 className="h1" style={{ fontSize:30, marginTop:6 }}>Durée &<br/>fréquence</h1>

            <div className="between"><span className="stat-big num" style={{ fontSize:40, color:'var(--acc)' }}>{weeks}</span><span className="muted">semaines</span></div>
            <Seg value={weeks} onChange={setWeeks} options={[8,9,10,11,12]} /></div>
          <div className="col" style={{ gap:10 }}><span className="lbl">Jours / semaine</span>
            <Seg value={days} onChange={setDays} options={[3,4,5]} /></div>
        </div>}

        {step===2 && <div className="col fade-up" style={{ gap:14 }}>
          <h1 className="h1" style={{ fontSize:30, marginTop:6 }}>Récapitulatif</h1>
          <div className="card" style={{ padding:16 }}>
            <div className="between" style={{ padding:'8px 0' }}><span className="muted">Nom</span><span style={{ fontWeight:600 }}>{name||'Nouveau programme'}</span></div>

            <div className="between" style={{ padding:'8px 0' }}><span className="muted">Fréquence</span><span className="num" style={{ fontWeight:600 }}>{days} jours / sem.</span></div>
          </div>
          <div className="muted" style={{ fontSize:12, lineHeight:1.4 }}>Un planning {days} jours est généré ; tu pourras remplacer chaque exercice ensuite.</div>
        </div>}

        <div className="grow" />
        <button className="btn btn-acc" style={{ marginBottom:8 }} onClick={()=> step<2 ? setStep(step+1) : create()}>
          {step<2 ? <>Continuer <Icon n="fwd" s={18} c="var(--on-acc)"/></> : <>Créer le programme</>}</button>
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

<script type="text/babel" data-presets="react">
/* Root — nav stack · timer engine persistant · état + persistance · tweaks */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "scale": 1,
  "font": "grotesk",
  "palette": "vif",
  "sound": true
}/*EDITMODE-END*/;
const TODAY_ISO = '2026-06-04';
const FONTS = {
  grotesk:"'Space Grotesk', system-ui, sans-serif",
  system:"system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif",
  mono:"'Space Mono', ui-monospace, monospace",
};
const clone = (o)=>JSON.parse(JSON.stringify(o));
const TAB_ROOTS = ['home','stats','history','programs'];

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const persisted = React.useRef(GYM.load()).current;

  const [programs, setPrograms] = React.useState(()=> persisted.programs || { phase1: clone(GYM.PHASE1), vacances: clone(GYM.VACANCES) });
  const [activeProgramId, setActiveProgramId] = React.useState(persisted.activeProgramId || 'phase1');
  const [logs, setLogs] = React.useState(persisted.logs || {});
  const [notes, setNotes] = React.useState(persisted.notes || {});
  const [customCatalog, setCustomCatalog] = React.useState(persisted.customCatalog || {});
  const [sessionLog, setSessionLog] = React.useState(persisted.sessionLog || {});
  const [dayNotes, setDayNotes] = React.useState(persisted.dayNotes || {});
  const [stack, setStack] = React.useState([{ name:'home', params:{} }]);
  const [timer, setTimer] = React.useState({ active:false, remaining:0, total:0, label:'', accent:'', done:false, paused:false, exId:null });
  const audioRef = React.useRef(null);
  const soundRef = React.useRef(tw.sound); soundRef.current = tw.sound;

  const beep = ()=>{
    if (!soundRef.current) return;
    try {
      let c = audioRef.current; if(!c){ c = new (window.AudioContext||window.webkitAudioContext)(); audioRef.current = c; }
      if (c.state==='suspended') c.resume();
      const t = c.currentTime;
      [0,0.2,0.4].forEach((off,i)=>{ const o=c.createOscillator(), g=c.createGain();
        o.type='sine'; o.frequency.value = i===2?1320:990;
        g.gain.setValueAtTime(0.0001, t+off); g.gain.exponentialRampToValueAtTime(0.3, t+off+0.02); g.gain.exponentialRampToValueAtTime(0.0001, t+off+0.17);
        o.connect(g); g.connect(c.destination); o.start(t+off); o.stop(t+off+0.18); });
    } catch(e){}
  };

  // theme tokens → <html>
  React.useEffect(()=>{
    const h = document.documentElement;
    h.setAttribute('data-theme', tw.theme);
    h.classList.remove('pal-vif','pal-pastel','pal-warm'); h.classList.add('pal-'+tw.palette);
    h.style.setProperty('--ui-scale', String(tw.scale));
    h.style.setProperty('--font-ui', FONTS[tw.font]||FONTS.grotesk);
  }, [tw.theme, tw.palette, tw.scale, tw.font]);

  // persistance
  React.useEffect(()=>{ GYM.save({ programs, activeProgramId, logs, notes, customCatalog, sessionLog, dayNotes }); }, [programs, activeProgramId, logs, notes, customCatalog, sessionLog, dayNotes]);

  // timer engine (le décompte reste pur)
  React.useEffect(()=>{
    if (!timer.active || timer.paused || timer.done) return;
    const iv = setInterval(()=> setTimer(p=>{
      if (p.remaining<=1) return {...p, remaining:0, done:true};
      return {...p, remaining:p.remaining-1};
    }), 1000);
    return ()=>clearInterval(iv);
  }, [timer.active, timer.paused, timer.done]);

  // fin de repos → son + vibration + notification système
  React.useEffect(()=>{
    if (!timer.done) return;
    try{ navigator.vibrate && navigator.vibrate([300,120,300,120,300]); }catch(e){}
    beep();
    try{ if ('Notification' in window && Notification.permission==='granted' && document.hidden)
      new Notification('Repos terminé 💪', { body: (timer.label||'Série suivante')+' — c’est reparti', tag:'gym-rest' }); }catch(e){}
  }, [timer.done]);

  const program = programs[activeProgramId];
  const today = program.days['jeu'] ? 'jeu' : Object.keys(program.days)[0];
  const dayColor = (k)=> activeProgramId==='vacances' ? 'var(--d-vac)' : (GYM.DAY_COLOR[k] || 'var(--d-jeu)');

  // nav
  const route = stack[stack.length-1];
  const push = (name, params={}, replace=false)=> setStack(s=> replace ? [...s.slice(0,-1), {name,params}] : [...s, {name,params}]);
  const pop = ()=> setStack(s=> s.length>1 ? s.slice(0,-1) : s);
  const goTab = (id)=> setStack([{ name:id, params:{} }]);

  // logs
  const keyOf = (dayKey, e)=> activeProgramId+':'+dayKey+':'+e.id;
  const getSets = (dayKey, e)=> logs[keyOf(dayKey,e)] || Array.from({length:e.setsN}, ()=>({ reps:e.reps, w:e.weight, done:false, sReps:e.superReps, sW:e.superWeight }));
  const setSets = (dayKey, e, sets)=> setLogs(l=> ({...l, [keyOf(dayKey,e)]: sets }));
  const sessionProgress = (dayKey)=>{
    const exs = program.days[dayKey].exercises; let done=0, total=0;
    exs.forEach(e=>{ const s = logs[keyOf(dayKey,e)]; total+=e.setsN; done += s? s.filter(x=>x.done).length : 0; });
    return { done, total };
  };
  // volume réellement logué aujourd'hui (séries cochées) + complétude de la séance
  const loggedTodayVolume = (()=>{ const day = program.days[today]; if(!day) return 0;
    return day.exercises.reduce((sum,e)=>{ const s = logs[keyOf(today,e)]; if(!s) return sum;
      return sum + s.reduce((a,x)=> a + (x.done ? ((e.bw?0:(x.reps||0)*(x.w||0)) + (e.superName?(x.sReps||0)*(x.sW||0):0)) : 0), 0); }, 0); })();
  const todayComplete = (()=>{ const day = program.days[today]; if(!day) return false;
    return day.exercises.every(e=>{ const s = logs[keyOf(today,e)]; return !!s && s.filter(x=>x.done).length >= e.setsN; }); })();
  // une séance n'entre dans l'historique qu'une fois TERMINÉE (évite qu'un log partiel fausse les agrégats)
  React.useEffect(()=>{ if (todayComplete && loggedTodayVolume>0)
    setSessionLog(sl=> (sl[TODAY_ISO] && sl[TODAY_ISO].volume===loggedTodayVolume) ? sl
      : ({...sl, [TODAY_ISO]:{ volume:loggedTodayVolume, day:today, programId:activeProgramId }})); }, [todayComplete, loggedTodayVolume]);

  // timer ctrls
  const startTimer = (sec, label, accent, exId)=>{
    try{ if ('Notification' in window && Notification.permission==='default') Notification.requestPermission(); }catch(e){}
    try{ if(!audioRef.current) audioRef.current = new (window.AudioContext||window.webkitAudioContext)(); audioRef.current.resume && audioRef.current.resume(); }catch(e){}
    setTimer({ active:true, remaining:sec, total:sec, label, accent, done:false, paused:false, exId });
  };
  const timerCtrl = {
    addTime:(d)=> setTimer(p=>{ const r=Math.max(0,p.remaining+d); return {...p, remaining:r, total:Math.max(p.total,r), done:false }; }),
    togglePause:()=> setTimer(p=>({...p, paused:!p.paused})),
    stop:()=> setTimer(p=>({...p, active:false, done:false, paused:false })),
  };

  // program ops
  const switchProgram = (id)=> setActiveProgramId(id);
  const replaceExercise = (programId, dayKey, exIndex, newName)=> setPrograms(prev=>{
    const p = prev[programId]; const day = p.days[dayKey]; const old = day.exercises[exIndex];
    const repl = GYM.ex(newName, old.setsN, old.reps, old.weight, old.rest, old.last, { unit:old.unit, bw:old.bw, target:old.target });
    return {...prev, [programId]:{...p, days:{...p.days, [dayKey]:{...day, exercises: day.exercises.map((e,i)=>i===exIndex?repl:e)}}}};
  });
  const addProgram = (prog)=> setPrograms(prev=>({...prev, [prog.id]:prog}));
  const addExerciseToDay = (programId, dayKey, spec)=> setPrograms(prev=>{
    const p = prev[programId]; const day = p.days[dayKey];
    const e = GYM.ex(spec.name, spec.setsN, spec.reps, spec.weight, spec.rest||90, spec.bw?'PdC':GYM.fmtKg(spec.weight)+' kg', { unit:spec.unit, bw:spec.bw, target:null });
    return {...prev, [programId]:{...p, days:{...p.days, [dayKey]:{...day, exercises:[...day.exercises, e]}}}};
  });
  const removeExercise = (programId, dayKey, exIndex)=> setPrograms(prev=>{
    const p = prev[programId]; const day = p.days[dayKey];
    if (day.exercises.length<=1) return prev;
    return {...prev, [programId]:{...p, days:{...p.days, [dayKey]:{...day, exercises: day.exercises.filter((_,i)=>i!==exIndex)}}}};
  });
  const addCustomExercise = (spec)=> setCustomCatalog(c=>{
    const arr = c[spec.group]||[]; if (arr.includes(spec.name)) return c;
    return {...c, [spec.group]:[spec.name, ...arr]};
  });
  const setSuperset = (programId, dayKey, exIndex, spec)=> setPrograms(prev=>{
    const p = prev[programId]; const day = p.days[dayKey];
    const exercises = day.exercises.map((e,i)=> i!==exIndex ? e : (spec
      ? {...e, superName:spec.name, superWeight: spec.bw?0:(spec.weight||0), superReps:spec.reps||10, superUnit: spec.unit||'kg', superBw: !!spec.bw}
      : {...e, superName:null, superWeight:null, superReps:null, superUnit:null, superBw:false}));
    return {...prev, [programId]:{...p, days:{...p.days, [dayKey]:{...day, exercises}}}};
  });
  const updateExercise = (programId, dayKey, exIndex, patch)=> setPrograms(prev=>{
    const p = prev[programId]; const day = p.days[dayKey];
    return {...prev, [programId]:{...p, days:{...p.days, [dayKey]:{...day, exercises: day.exercises.map((e,i)=> i===exIndex ? {...e, ...patch} : e)}}}};
  });
  const setDayNote = (key, text)=> setDayNotes(n=>({...n, [key]: text}));
  const addNote = (name, txt)=>{ if(!txt || !txt.trim()) return; setNotes(n=>({...n, [name]:[{date:'auj.', note:txt.trim()}, ...(n[name]||[])]})); };

  const ctx = { programs, program, activeProgramId, today, weekNo: program.currentWeek, dayColor,
    push, pop, goTab, route, getSets, setSets, sessionProgress, startTimer, timer, timerCtrl,
    switchProgram, replaceExercise, addProgram, addExerciseToDay, removeExercise, setSuperset, updateExercise,
    customCatalog, addCustomExercise, notes, addNote, sessionLog, loggedTodayVolume, todayComplete,
    dayNotes, setDayNote };

  const SCREENS = { home:HomeScreen, stats:StatsScreen, history:HistoryListScreen, programs:ProgramsScreen,
    session:SessionScreen, track:TrackScreen, timer:TimerScreen, historyEx:HistoryExScreen,
    comment:CommentScreen, programEdit:ProgramEditScreen, newProgram:NewProgramScreen };
  const Screen = SCREENS[route.name] || HomeScreen;
  const isTab = TAB_ROOTS.includes(route.name);
  const showMini = timer.active && route.name!=='timer';

  return (
    <React.Fragment>
      <div className="app app-theme" style={{ '--acc': dayColor(today), position:'fixed', inset:0 }}>
        <Screen key={route.name+JSON.stringify(route.params)} ctx={ctx} params={route.params} />
        {showMini && <MiniTimer remaining={timer.remaining} total={timer.total} done={timer.done}
          label={timer.label} accent={timer.accent} onOpen={()=>push('timer',{})} onStop={timerCtrl.stop} />}
        {isTab && <TabBar active={route.name} onNav={goTab} />}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Apparence" />
        <TweakRadio label="Thème" value={tw.theme}
          options={[{value:'dark',label:'Dark'},{value:'light',label:'Jour'}]} onChange={v=>setTweak('theme',v)} />
        <TweakSlider label="Taille du texte" value={tw.scale} min={0.9} max={1.15} step={0.05} onChange={v=>setTweak('scale',v)} />
        <TweakSelect label="Police" value={tw.font}
          options={[{value:'grotesk',label:'Grotesk (déf.)'},{value:'system',label:'Système'},{value:'mono',label:'Mono'}]} onChange={v=>setTweak('font',v)} />
        <TweakSection label="Couleurs des jours" />
        <TweakRadio label="Palette" value={tw.palette}
          options={[{value:'vif',label:'Vif'},{value:'pastel',label:'Pastel'},{value:'warm',label:'Chaud'}]} onChange={v=>setTweak('palette',v)} />
        <div style={{ padding:'2px 14px 10px', display:'flex', gap:6 }}>
          {['lun','mar','mer','jeu','ven','vac'].map(d=>(<span key={d} style={{ flex:1, height:18, borderRadius:5, background:'var(--d-'+d+')' }} />))}
        </div>
        <TweakSection label="Repos" />
        <TweakToggle label="Son de fin de repos" value={tw.sound} onChange={v=>setTweak('sound',v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
