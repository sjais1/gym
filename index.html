<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GYM"/>
<meta name="theme-color" content="#08090B"/>
<title>GYM Stéphane</title>
<style>
/* =========================================================================
   App Gym — Hi-fi prototype tokens  (Spectrum + Focus language)
   Dark by default · per-day vif palette · Archivo display / Space Grotesk UI
   ========================================================================= */
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root{
  --font-disp:'Archivo', system-ui, sans-serif;
  --font-ui:'Space Grotesk', system-ui, sans-serif;
  --font-num:'Space Mono', ui-monospace, monospace;
  --ui-scale:1;

  /* vif palette (default) */
  --d-lun:#4D8DFF; --d-mar:#A78BFF; --d-mer:#2DD4BF;
  --d-jeu:#B6F23E; --d-ven:#FF4D6D; --d-vac:#EAD08A;
  --acc:var(--d-jeu);               /* current context accent */
  --good:#46D08A;
}
.pal-vif{ --d-lun:#4D8DFF; --d-mar:#A78BFF; --d-mer:#2DD4BF; --d-jeu:#B6F23E; --d-ven:#FF4D6D; --d-vac:#EAD08A; }
.pal-pastel{ --d-lun:#9DBEFF; --d-mar:#CBBBFF; --d-mer:#9AE6D8; --d-jeu:#DCF29B; --d-ven:#FFA9B9; --d-vac:#F0DFB4; }
.pal-warm{ --d-lun:#5AA0FF; --d-mar:#C08BFF; --d-mer:#34D9C0; --d-jeu:#C7F24E; --d-ven:#FF6B7E; --d-vac:#F0CB7A; }

/* THEME ------------------------------------------------------------------ */
.app-theme{
  --bg:#08090B; --bg2:#0E1013; --surface:#15181C; --surface2:#1E2228;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --fg:#F5F6F8; --fg2:#B7BDC5; --muted:#787F89;
  --on-acc:#0A0B0D; --skel:rgba(255,255,255,.06);
  --glass:rgba(18,20,24,.72);
}
[data-theme="light"] .app-theme{
  --bg:#ECEEF1; --bg2:#FFFFFF; --surface:#FFFFFF; --surface2:#F2F4F7;
  --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.15);
  --fg:#0A0B0D; --fg2:#3B414A; --muted:#7C828B;
  --on-acc:#0A0B0D; --skel:rgba(0,0,0,.05);
  --glass:rgba(248,249,251,.78);
}

/* SHELL ------------------------------------------------------------------ */
.app{
  position:relative; width:100%; height:100%; background:var(--bg); color:var(--fg);
  font-family:var(--font-ui); display:flex; flex-direction:column;
  font-size:calc(15px*var(--ui-scale)); -webkit-font-smoothing:antialiased;
  letter-spacing:.1px; overflow:hidden;
}
.app *{box-sizing:border-box}
.app ::-webkit-scrollbar{width:0;height:0}
.app *{scrollbar-width:none}
/* Base state is fully visible — animation only nudges position so content is
   never blank if the animation clock is frozen (hidden tab / PWA relaunch / print). */
.screen{flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
  display:flex; flex-direction:column; opacity:1}
@media (prefers-reduced-motion: no-preference){
  .screen{animation:scrIn .32s cubic-bezier(.2,.7,.3,1)}
}
@keyframes scrIn{from{transform:translateY(8px)}to{transform:none}}
.pad{padding:0 18px}
.safe-top{height:54px;flex:0 0 auto}      /* clear island/status bar */
.scroll-pad{padding-bottom:26px}

/* TYPE ------------------------------------------------------------------- */
.disp{font-family:var(--font-disp);font-weight:800;letter-spacing:-.5px;line-height:.95}
.kicker{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted)}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}
.muted{color:var(--muted)} .fg2{color:var(--fg2)}
.h1{font-family:var(--font-disp);font-weight:800;font-size:32px;letter-spacing:-1px;line-height:.98}
.h2{font-family:var(--font-disp);font-weight:700;font-size:20px;letter-spacing:-.3px}
.lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;white-space:nowrap}

/* ATOMS ------------------------------------------------------------------ */
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px}
.chip{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 11px;border-radius:999px;
  background:var(--surface2);font-size:12px;font-weight:600;color:var(--fg2);white-space:nowrap}
.chip.acc{background:color-mix(in srgb,var(--acc) 20%,transparent);color:var(--acc)}
.chip.ghost{background:transparent;border:1px solid var(--line2)}
.chip.good{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--acc)}
.divider{height:1px;background:var(--line);width:100%}

.btn{font-family:var(--font-ui);font-weight:700;border:none;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,filter .15s}
.btn:active{transform:scale(.97)}
.btn-acc{background:var(--acc);color:var(--on-acc);border-radius:16px;height:54px;font-size:16px;
  font-family:var(--font-disp);font-weight:800;letter-spacing:.2px;width:100%}
.btn-ghost{background:var(--surface2);color:var(--fg);border-radius:14px;height:48px;font-size:14px}
.btn-line{background:transparent;border:1px solid var(--line2);color:var(--fg);border-radius:14px;height:46px;font-size:14px}
.icon-btn{width:42px;height:42px;border-radius:13px;background:var(--surface2);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--fg);flex:0 0 auto;transition:transform .12s}
.icon-btn:active{transform:scale(.92)}

/* check */
.check{width:26px;height:26px;border-radius:9px;border:2px solid var(--line2);flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;background:transparent;cursor:pointer;transition:.15s}
.check.on{background:var(--acc);border-color:var(--acc)}
.check.on svg{stroke:var(--on-acc)}

/* stepper */
.step{display:flex;align-items:center;gap:0;background:var(--surface2);border-radius:13px;overflow:hidden}
.step button{width:40px;height:40px;border:none;background:transparent;color:var(--fg);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.step button:active{background:var(--line)}
.step .val{min-width:54px;text-align:center;font-family:var(--font-num);font-weight:700;font-size:16px}

/* segmented control */
.seg{display:flex;background:var(--surface2);border-radius:13px;padding:3px;gap:2px}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-family:var(--font-ui);
  font-weight:600;font-size:12.5px;padding:8px 4px;border-radius:10px;cursor:pointer;transition:.18s;white-space:nowrap}
.seg button.on{background:var(--bg2);color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.25)}
[data-theme="light"] .seg button.on{box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* SPECTRUM color header --------------------------------------------------- */
.sp-head{background:var(--acc);color:var(--on-acc);position:relative;overflow:hidden;
  padding:calc(54px + 50px) 20px 22px;border-radius:0 0 26px 26px}
.sp-head::after{content:"";position:absolute;right:-44px;top:-30px;width:150px;height:150px;border-radius:50%;
  background:rgba(0,0,0,.07)}
.sp-head .hk{font-size:11px;font-weight:800;letter-spacing:1.8px;opacity:.62}
.sp-head .ht{font-family:var(--font-disp);font-weight:900;font-size:34px;letter-spacing:-1px;line-height:.92;margin-top:4px}
.sp-head .hpills{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;position:relative}
.sp-head .hpill{background:rgba(0,0,0,.13);border-radius:999px;padding:5px 11px;font-size:12px;font-weight:700}
.on-acc-soft{color:rgba(10,11,13,.62)}

/* spectrum row */
.sp-row{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;background:var(--surface);
  border:1px solid var(--line);transition:transform .12s}
.sp-row:active{transform:scale(.99)}
.sp-row .bar{width:4px;align-self:stretch;border-radius:3px;background:var(--acc)}
.sp-row .nm{font-weight:600;flex:1;font-size:14.5px}
.sp-row .v{font-family:var(--font-disp);font-weight:800;font-size:15px}

/* TAB BAR ---------------------------------------------------------------- */
.tabbar{flex:0 0 auto;display:flex;padding:7px 12px calc(8px + 18px);gap:2px;
  background:var(--glass);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border-top:1px solid var(--line)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;
  cursor:pointer;color:var(--muted);min-height:46px;justify-content:center}
.tab svg{display:block}
.tab .tl{font-size:9.5px;font-weight:700;letter-spacing:.4px}
.tab.on{color:var(--fg)}
.tab.on svg{color:var(--acc)}

/* MINI TIMER ------------------------------------------------------------- */
.mini-timer{flex:0 0 auto;margin:0 12px 6px;border-radius:16px;overflow:hidden;cursor:pointer;
  background:var(--acc);color:var(--on-acc);display:flex;align-items:center;gap:12px;padding:11px 14px;
  box-shadow:0 8px 24px color-mix(in srgb,var(--acc) 30%,transparent);animation:miniIn .3s cubic-bezier(.2,.8,.2,1)}
@keyframes miniIn{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
.mini-timer.done{animation:flash .7s ease-in-out infinite}
@keyframes flash{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
.mini-timer .mt-num{font-family:var(--font-disp);font-weight:900;font-size:22px;letter-spacing:-.5px;min-width:62px}
.mini-timer .mt-prog{flex:1;height:4px;background:rgba(0,0,0,.18);border-radius:3px;overflow:hidden}
.mini-timer .mt-prog i{display:block;height:100%;background:#0A0B0D;border-radius:3px;transition:width 1s linear}

/* sheet / modal  (base = visible end-state; animate only when motion is allowed) */
.scrim{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;flex-direction:column;
  justify-content:flex-end; opacity:1}
.sheet{background:var(--bg2);border-radius:26px 26px 0 0;border-top:1px solid var(--line2);
  padding:10px 18px calc(20px + 18px);max-height:86%;overflow-y:auto}
@media (prefers-reduced-motion: no-preference){
  .scrim{animation:fade .2s ease forwards}
  .sheet{animation:sheetUp .32s cubic-bezier(.2,.8,.2,1)}
}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.sheet .grab{width:38px;height:5px;border-radius:3px;background:var(--line2);margin:4px auto 12px}

/* progress / charts ------------------------------------------------------ */
.pbar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;width:100%}
.pbar i{display:block;height:100%;background:var(--acc);border-radius:4px;transition:width .4s}
.bars{display:flex;align-items:flex-end;gap:6px;height:120px}
.bars i{flex:1;background:var(--acc);border-radius:5px 5px 0 0;opacity:.85;min-height:5px;transition:height .4s}
.bars i.dim{background:var(--line2)}
.heat{display:flex;gap:5px}
.heat b{flex:1;aspect-ratio:1;border-radius:7px;background:var(--surface2);display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;color:var(--muted)}
.heat b.on{background:var(--acc);color:var(--on-acc)}

/* misc */
.row{display:flex;align-items:center;gap:10px}
.col{display:flex;flex-direction:column}
.between{display:flex;align-items:center;justify-content:space-between}
.stat-big{font-family:var(--font-disp);font-weight:900;letter-spacing:-1px}
.grow{flex:1}
.fade-up{animation:fadeUp .4s both}
@media (prefers-reduced-motion: reduce){ .fade-up{animation:none} }
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tap{cursor:pointer}

/* === MOBILE PWA OVERRIDE === */
html, body, #root {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #08090B;
  overflow: hidden;
}
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
.app {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  max-width: 100vw !important;
  max-height: 100vh !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  overflow: hidden !important;
}
.safe-top { height: env(safe-area-inset-top, 50px) !important; min-height: 44px !important; flex-shrink: 0 !important; }
.tabbar { padding-bottom: calc(8px + env(safe-area-inset-bottom, 20px)) !important; }
.screen { flex: 1 !important; min-height: 0 !important; overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; }

</style>
</head>
<body>
<div id="root"></div>

<!-- Error display -->
<div id="err-display" style="display:none;position:fixed;inset:0;background:#1a0000;color:#ff9999;
  font-family:monospace;font-size:12px;padding:60px 16px 20px;z-index:99999;overflow:auto;
  white-space:pre-wrap;word-break:break-all;"></div>
<script>
window.onerror = function(msg,src,line,col,err) {
  var d=document.getElementById('err-display');
  d.style.display='block';
  d.textContent='ERREUR:\n'+msg+'\nLigne:'+line+'\n\n'+(err&&err.stack?err.stack:'');
};
</script>

<!-- React + ReactDOM + Babel via CDN -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<!-- Data (pas de JSX) -->
<script>
/* =========================================================================
   App Gym — data model  (window.GYM)
   Programmes, bibliothèque d'exercices, historique, stats (masse soulevée),
   + persistance localStorage.
   ========================================================================= */
(function () {
  const DAYS = [
    { id:'lun', short:'LUN', name:'Lundi',    group:'ÉPAULES' },
    { id:'mar', short:'MAR', name:'Mardi',    group:'PECS' },
    { id:'mer', short:'MER', name:'Mercredi', group:'DOS' },
    { id:'jeu', short:'JEU', name:'Jeudi',    group:'JAMBES' },
    { id:'ven', short:'VEN', name:'Vendredi', group:'HIIT' },
  ];
  const DAY_COLOR = { lun:'var(--d-lun)', mar:'var(--d-mar)', mer:'var(--d-mer)', jeu:'var(--d-jeu)', ven:'var(--d-ven)', vac:'var(--d-vac)' };

  const ex = (name, setsN, reps, weight, rest, last, opt={}) =>
    ({ id: name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,24)+'-'+Math.random().toString(36).slice(2,5),
       name, setsN, reps, weight, rest, last, unit: opt.unit||'kg', bw: !!opt.bw, target: opt.target||null,
       superName: opt.superName||null, superWeight: opt.superWeight!=null?opt.superWeight:null, superReps: opt.superReps||null });

  const PHASE1 = {
    id:'phase1', name:'Phase 1 — Hypertrophie', weeks:8, currentWeek:3, startISO:'2026-05-11',
    days: {
      lun:{ focus:'Épaules', group:'ÉPAULES', exercises:[
        ex('Développé militaire',4,8,42,120,'40 kg',{target:44}),
        ex('Élévations latérales',4,15,10,75,'9 kg'),
        ex('Oiseau poulie',3,15,7.5,75,'7,5 kg'),
        ex('Face pull',3,15,25,60,'22,5 kg'),
        ex('Shrugs haltères',3,15,28,60,'26 kg'),
      ]},
      mar:{ focus:'Pectoraux', group:'PECS', exercises:[
        ex('Développé couché',4,8,72,150,'70 kg',{target:75}),
        ex('Développé incliné haltères',4,10,28,120,'26 kg'),
        ex('Écarté poulie',3,15,12.5,75,'12,5 kg'),
        ex('Dips lestés',3,10,10,90,'8 kg'),
        ex('Pompes serrées',3,15,0,60,'PdC',{bw:true}),
      ]},
      mer:{ focus:'Dos', group:'DOS', exercises:[
        ex('Soulevé de terre',4,6,120,180,'115 kg',{target:125}),
        ex('Tractions lestées',4,8,10,120,'7,5 kg'),
        ex('Rowing barre',4,10,65,120,'62,5 kg'),
        ex('Tirage horizontal',3,12,60,90,'57,5 kg'),
        ex('Tirage vertical',3,12,55,75,'52,5 kg'),
      ]},
      jeu:{ focus:'Jambes + Abdos', group:'JAMBES', exercises:[
        ex('Leg press',4,10,93,120,'90 kg',{target:97}),
        ex('Squat Smith',4,10,65,120,'62,5 kg',{target:70}),
        ex('Fentes marchées',2,10,16,90,'16 kg',{unit:'kg/main'}),
        ex('Leg curl', 3,12, 38, 90, '36 kg', {target:42, superName:'Leg extension', superWeight:46, superReps:12}),
        ex('Hip thrust',2,20,20,90,'20 kg',{target:24}),
        ex('Relevés jambes suspendu',3,12,0,60,'PdC',{bw:true}),
        ex('Crunch poulie',3,15,25,60,'22,5 kg'),
      ]},
      ven:{ focus:'HIIT', group:'HIIT', exercises:[
        ex('Assault bike',5,30,0,60,'—',{bw:true,unit:'s'}),
        ex('Kettlebell swing',5,20,24,45,'20 kg'),
        ex('Burpees',5,15,0,45,'PdC',{bw:true}),
        ex('Mountain climbers',5,40,0,30,'PdC',{bw:true}),
      ]},
    },
    note: { day:'jeu', text:'Si réveil nocturne persiste → déplacer les abdos au mercredi.' },
  };

  const VACANCES = {
    id:'vacances', name:'Vacances — Déplacement', weeks:2, currentWeek:1,
    days: {
      a:{ focus:'Full body A', group:'VOYAGE', exercises:[
        ex('Pompes',4,20,0,60,'PdC',{bw:true}),
        ex('Squats sautés',4,20,0,60,'PdC',{bw:true}),
        ex('Fentes alternées',3,16,0,45,'PdC',{bw:true}),
        ex('Gainage',3,45,0,45,'PdC',{bw:true,unit:'s'}),
      ]},
      b:{ focus:'Full body B', group:'VOYAGE', exercises:[
        ex('Tractions élastique',4,12,0,75,'PdC',{bw:true}),
        ex('Dips entre 2 chaises',4,12,0,60,'PdC',{bw:true}),
        ex('Hip thrust unilatéral',3,15,0,45,'PdC',{bw:true}),
        ex('Burpees',4,12,0,45,'PdC',{bw:true}),
      ]},
    },
  };

  // Catégories du catalogue (plus large que les groupes de jour)
  const CATS = ['ÉPAULES','PECS','DOS','JAMBES','FESSIERS','MOLLETS','BICEPS','TRICEPS','ABDOS','CARDIO / HIIT','POIDS DU CORPS'];

  // Bibliothèque complète — machines de salle, charges libres, poids du corps, cardio
  const CATALOG = {
    'ÉPAULES':['Développé militaire','Développé Arnold','Développé épaules machine','Développé Smith','Élévations latérales haltères','Élévations latérales poulie','Élévations frontales','Oiseau haltères','Oiseau poulie','Rowing menton','Face pull','Shrugs haltères','Shrugs barre'],
    'PECS':['Développé couché barre','Développé incliné barre','Développé décliné','Développé couché haltères','Développé incliné haltères','Développé machine convergente','Pec deck (butterfly)','Écarté poulie vis-à-vis','Écarté haltères','Dips lestés','Pull-over'],
    'DOS':['Soulevé de terre','Soulevé de terre roumain','Rack pull','Tractions','Tractions lestées','Tirage vertical (lat pulldown)','Tirage horizontal (rowing assis)','Rowing barre','Rowing T-bar','Rowing haltère unilatéral','Rowing Yates','Pull-over poulie','Good morning','Hyperextensions lombaires'],
    'JAMBES':['Squat barre','Squat Smith','Front squat','Presse à cuisses (leg press)','Presse inclinée','Hack squat','Fentes marchées','Fentes bulgares','Leg extension','Leg curl assis','Leg curl allongé','Soulevé jambes tendues','Hip thrust','Adducteurs machine','Abducteurs machine','Box jumps'],
    'FESSIERS':['Hip thrust','Kickback poulie','Abducteurs machine','Pont fessier','Fentes marchées','Bulgarian split squat'],
    'MOLLETS':['Mollets debout machine','Mollets assis machine','Mollets à la presse'],
    'BICEPS':['Curl barre','Curl haltères','Curl marteau','Curl pupitre (Larry Scott)','Curl poulie','Curl incliné'],
    'TRICEPS':['Extension poulie corde','Barre au front','Dips','Extension nuque haltère','Kickback','Extension poulie unilatérale'],
    'ABDOS':['Crunch poulie','Relevés jambes suspendu','Gainage','Planche latérale','Roue abdominale','Crunch machine','Russian twist','Relevés de bassin'],
    'CARDIO / HIIT':['Assault bike','Rameur','Rameur sprint','Tapis course','Vélo','Corde à sauter','Burpees','Mountain climbers','Kettlebell swing','Thrusters','Box step-over','Sprint'],
    'POIDS DU CORPS':['Pompes','Pompes diamant','Pompes serrées','Squats','Squats sautés','Fentes alternées','Fentes bulgares','Gainage','Tractions élastique','Dips entre 2 chaises','Burpees','Chaise murale','Superman','Jumping jacks','Hip thrust unilatéral'],
  };
  // groupe de jour → catégorie par défaut du picker
  const GROUP_TO_CAT = { 'ÉPAULES':'ÉPAULES','PECS':'PECS','DOS':'DOS','JAMBES':'JAMBES','HIIT':'CARDIO / HIIT','VOYAGE':'POIDS DU CORPS' };
  const LIBRARY = CATALOG; // alias rétro-compat

  // ---- volume réel = Σ (poids × reps × séries) sur tous les exercices ----
  const exVolume = (e)=> (e.bw ? 0 : (e.weight||0)*(e.reps||0)*(e.setsN||0))
    + (e.superName ? (e.superWeight||0)*(e.superReps||0)*(e.setsN||0) : 0);
  const dayVolume = (day)=> day.exercises.reduce((s,e)=> s + exVolume(e), 0);
  const weekVolume = (program)=> Object.values(program.days).reduce((s,d)=> s + dayVolume(d), 0);

  // ---- Historique d'un exercice (Squat Smith) ----
  const HISTORY = {
    squat: [
      { dateISO:'2026-06-04', date:'4 juin',  sets:[{reps:10,w:65},{reps:10,w:65},{reps:10,w:65},{reps:9,w:62.5}], note:'Dernière série à 62,5 — fin de réserve.' },
      { dateISO:'2026-05-28', date:'28 mai',  sets:[{reps:10,w:62.5},{reps:10,w:62.5},{reps:10,w:62.5},{reps:10,w:62.5}], note:'Propre, prêt à monter.' },
      { dateISO:'2026-05-21', date:'21 mai',  sets:[{reps:10,w:62.5},{reps:10,w:62.5},{reps:9,w:62.5},{reps:8,w:60}], note:'' },
      { dateISO:'2026-05-14', date:'14 mai',  sets:[{reps:10,w:60},{reps:10,w:60},{reps:10,w:60},{reps:10,w:60}], note:'Genou ok après échauffement.' },
      { dateISO:'2026-05-07', date:'7 mai',   sets:[{reps:10,w:60},{reps:10,w:60},{reps:9,w:57.5}], note:'Reprise après pause.' },
      { dateISO:'2026-04-30', date:'30 avr',  sets:[{reps:10,w:57.5},{reps:10,w:57.5},{reps:10,w:57.5}], note:'' },
    ],
  };

  // ---- Sessions passées pour la masse totale (génère ~26 semaines) ----
  function genSessions() {
    const out = [];
    const today = new Date('2026-06-04');
    const dayCodes = ['lun','mar','mer','jeu','ven'];
    // volume de chaque séance = vrai calcul Σ poids×reps×séries du jour, atténué dans le passé
    for (let w = 25; w >= 0; w--) {
      dayCodes.forEach((dc, di) => {
        if (Math.random() < 0.12 && w > 0) return; // séance ratée occasionnelle
        const d = new Date(today);
        d.setDate(today.getDate() - (w*7) + (di - 3));
        const baseVol = dayVolume(PHASE1.days[dc]) || 4000;
        const progression = 0.80 + (25 - w) * 0.008;   // plus léger dans le passé
        const vol = Math.round(baseVol * progression * (0.95 + Math.random()*0.10));
        out.push({ dateISO: d.toISOString().slice(0,10), ts: d.getTime(), day: dc, volume: vol });
      });
    }
    return out.sort((a,b)=>a.ts-b.ts);
  }
  const SESSIONS = genSessions();

  // ---- helpers ----
  const fmtKg = (n) => (n==null||n==='')?'—': Number(n).toFixed(2).replace('.', ',');
  const fmtInt = (n) => Math.round(n).toLocaleString('fr-FR');
  const fmtTon = (kg) => {
    if (kg >= 1000) return (kg/1000).toFixed(1).replace('.', ',') + ' t';
    return fmtInt(kg) + ' kg';
  };
  const setsVolume = (sets) => sets.reduce((s,x)=> s + (x.reps||0)*(x.w||x.weight||0), 0);

  function aggregate(period, realByDate) {
    // returns {points:[{label,value}], total, deltaPct}. realByDate: {ISO: volume} (séances réellement loguées)
    const now = new Date('2026-06-04').getTime();
    const DAY = 86400000;
    const vol = (s)=> (realByDate && realByDate[s.dateISO]!=null) ? realByDate[s.dateISO] : s.volume;
    let buckets = [];
    if (period === 'séance') {
      const last = SESSIONS.slice(-8);
      buckets = last.map(s => ({ label: GYM.DAYS.find(d=>d.id===s.day)?.short || s.day, value: vol(s) }));
    } else if (period === 'semaine') {
      const map = {};
      SESSIONS.forEach(s => { let wk = Math.floor((now - s.ts)/(7*DAY)); if(wk<0) wk=0; if(wk<8) map[wk]=(map[wk]||0)+vol(s); });
      buckets = [];
      for (let wk=7; wk>=0; wk--){ if(map[wk]!=null) buckets.push({ label: wk===0?'cette':('S-'+wk), value: map[wk] }); }
    } else if (period === 'mois') {
      const map = {};
      SESSIONS.forEach(s => { const m = new Date(s.ts); const k = m.getFullYear()+'-'+m.getMonth(); (map[k]=(map[k]||0)+vol(s)); });
      const months=['jan','fév','mar','avr','mai','jui','jul','aoû','sep','oct','nov','déc'];
      buckets = Object.keys(map).slice(-6).map(k => ({ label: months[Number(k.split('-')[1])], value: map[k] }));
    } else { // année
      const map = {};
      SESSIONS.forEach(s => { const y = new Date(s.ts).getFullYear(); (map[y]=(map[y]||0)+vol(s)); });
      buckets = Object.keys(map).map(y => ({ label: y, value: map[y] }));
      // pad a previous year for comparison
      if (buckets.length < 2) buckets.unshift({ label:'2025', value: Math.round(buckets[0].value*0.74) });
    }
    const total = buckets.reduce((s,b)=>s+b.value,0);
    let deltaPct = buckets.length>=2 ? Math.round(((buckets[buckets.length-1].value - buckets[buckets.length-2].value)/buckets[buckets.length-2].value)*100) : 0;
    // Mois/Année : le bucket courant est une période PARTIELLE → comparer à la même fenêtre (to-date) de la période précédente
    if (period==='mois' || period==='année') {
      const nowD = new Date('2026-06-04');
      const prevD = new Date(nowD);
      if (period==='mois') prevD.setMonth(prevD.getMonth()-1); else prevD.setFullYear(prevD.getFullYear()-1);
      const inCur = (d)=> period==='mois'
        ? (d.getFullYear()===nowD.getFullYear() && d.getMonth()===nowD.getMonth() && d.getDate()<=nowD.getDate())
        : (d.getFullYear()===nowD.getFullYear() && d<=nowD);
      const inPrev = (d)=> period==='mois'
        ? (d.getFullYear()===prevD.getFullYear() && d.getMonth()===prevD.getMonth() && d.getDate()<=nowD.getDate())
        : (d.getFullYear()===prevD.getFullYear() && d<=prevD);
      let cur=0, prev=0;
      SESSIONS.forEach(s=>{ const d=new Date(s.ts); if(inCur(d)) cur+=vol(s); if(inPrev(d)) prev+=vol(s); });
      deltaPct = prev ? Math.round(((cur-prev)/prev)*100) : 0;
    }
    return { points: buckets, total, deltaPct, last: buckets[buckets.length-1]?.value || 0 };
  }

  // ---- persistance ----
  const KEY = 'gymv5.state.v4';
  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
  function save(state){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

  window.GYM = { DAYS, DAY_COLOR, PHASE1, VACANCES, LIBRARY, CATALOG, CATS, GROUP_TO_CAT, HISTORY, SESSIONS,
    ex, fmtKg, fmtInt, fmtTon, setsVolume, exVolume, dayVolume, weekVolume, aggregate, load, save };
})();

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel" data-presets="react">

  target:'M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z', trend:'M3 17l6-6 4 4 8-8M21 7v5h-5',

  plane:'M21 15l-8-3V5a1.5 1.5 0 0 0-3 0v7l-8 3v2l8-2v3l-2 1.5V21l3.5-1 3.5 1v-1.5L12 18v-3l9 2z',
  note:'M4 6h16M4 12h16M4 18h9', dots:'M5 12h.01M12 12h.01M19 12h.01', bell:'M6 8a6 6 0 0 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9M10 21a2 2 0 0 0 4 0',

  vol:'M11 5L6 9H2v6h4l5 4V5zM15 9a3 3 0 0 1 0 6M18 6a7 7 0 0 1 0 12',
};
function Icon({ n, s=20, w=2, c, style }) {
  return (<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c||'currentColor'}
    strokeWidth={w} strokeLinecap="round" strokeLinejoin="round" style={style}>
    <path d={I[n]} /></svg>);
}

function BackBtn({ onClick, label }) {
  return (<button className="row tap" onClick={onClick}
    style={{background:'none',border:'none',color:'inherit',padding:'4px 0',cursor:'pointer',gap:6,font:'inherit'}}>
    <Icon n="back" s={20} w={2.4}/>{label && <span style={{fontWeight:600,fontSize:14}}>{label}</span>}</button>);
}

function Check({ on, onClick }) {
  return (<button className={'check '+(on?'on':'')} onClick={onClick} aria-pressed={on}>
    {on && <Icon n="check" s={15} w={3.2} c="var(--on-acc)"/>}</button>);
}

function Stepper({ value, step=2.5, min=0, onChange, suffix }) {
  const fmt = (v)=> (Number.isInteger(v)? v : String(v).replace('.',','));
  return (<div className="step">
    <button onClick={()=>onChange(Math.max(min, +(value-step).toFixed(2)))}><Icon n="minus" s={18}/></button>
    <span className="val">{fmt(value)}{suffix?<span style={{fontSize:11,color:'var(--muted)'}}> {suffix}</span>:null}</span>
    <button onClick={()=>onChange(+(value+step).toFixed(2))}><Icon n="plus" s={18}/></button>
  </div>);
}

function Seg({ value, options, onChange }) {
  return (<div className="seg">{options.map(o=>{
    const v = typeof o==='object'?o.value:o, l = typeof o==='object'?o.label:o;
    return <button key={v} className={v===value?'on':''} onClick={()=>onChange(v)}>{l}</button>;
  })}</div>);
}

const TABS = [
  { id:'home',    label:'Séance',     icon:'dumbbell' },
  { id:'stats',   label:'Stats',      icon:'chart' },
  { id:'history', label:'Historique', icon:'clock' },
  { id:'programs',label:'Programmes', icon:'layers' },
];
function TabBar({ active, onNav }) {
  return (<nav className="tabbar">{TABS.map(t=>(
    <button key={t.id} className={'tab '+(active===t.id?'on':'')} onClick={()=>onNav(t.id)}>
      <Icon n={t.icon} s={22} w={active===t.id?2.3:2}/>
      <span className="tl">{t.label}</span>
    </button>))}</nav>);
}

function MiniTimer({ remaining, total, done, label, accent, onOpen, onStop }) {
  const mm = Math.floor(remaining/60), ss = String(remaining%60).padStart(2,'0');
  return (<div className={'mini-timer '+(done?'done':'')} style={{'--acc':accent}} onClick={onOpen}>
    <Icon n={done?'bell':'timer'} s={22} w={2.3} c="var(--on-acc)"/>
    <div className="mt-num">{done? 'GO' : mm+':'+ss}</div>
    <div className="col grow" style={{gap:5}}>
      <div style={{fontSize:11,fontWeight:700,opacity:.7}}>{done?'Repos terminé — tape pour reprendre':label}</div>
      <div className="mt-prog"><i style={{width:(total?Math.round((remaining/total)*100):0)+'%'}}/></div>
    </div>
    <button className="icon-btn" style={{width:34,height:34,background:'rgba(0,0,0,.14)',color:'var(--on-acc)'}}
      onClick={(e)=>{e.stopPropagation();onStop();}}><Icon n="x" s={16}/></button>
  </div>);
}

function Sheet({ title, onClose, children, accent }) {
  return (<div className="scrim" onClick={onClose}>
    <div className="sheet app-theme" style={accent?{'--acc':accent}:undefined} onClick={e=>e.stopPropagation()}>
      <div className="grab"/>
      {title && <div className="between" style={{marginBottom:14}}>
        <span className="h2">{title}</span>
        <button className="icon-btn" onClick={onClose}><Icon n="x" s={18}/></button>
      </div>}
      {children}
    </div>
  </div>);
}

Object.assign(window, { I, Icon, BackBtn, Check, Stepper, Seg, TabBar, MiniTimer, Sheet, TABS });

</script>
<script type="text/babel" data-presets="react">
/* ExercisePicker — bibliothèque complète + recherche + création d'exo perso.
   Rend son propre <Sheet>. onPick(spec) renvoie un exercice. */
const norm = (s)=> s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();

function ExercisePicker({ title, defaultGroup, mode='add', accent, customCatalog={}, onPick, onCreate, onClose }) {
  const cats = GYM.CATS;
  const startCat = GYM.GROUP_TO_CAT[defaultGroup] || cats[0];
  const [q, setQ] = React.useState('');
  const [cat, setCat] = React.useState(startCat);
  const [creating, setCreating] = React.useState(false);

  // formulaire exo perso
  const [fName, setFName] = React.useState('');
  const [fCat, setFCat] = React.useState(startCat);
  const [fSets, setFSets] = React.useState(4);
  const [fReps, setFReps] = React.useState(10);
  const [fBw, setFBw] = React.useState(false);
  const [fW, setFW] = React.useState(20);

  const listFor = (c)=> (GYM.CATALOG[c]||[]).concat(customCatalog[c]||[]);
  const specFrom = (name, c)=>{ const bw = c==='POIDS DU CORPS';
    return { name, group:c, setsN:4, reps: bw?15:10, weight: bw?0:20, unit: bw?'reps':'kg', bw, rest: c==='CARDIO / HIIT'?45:90 }; };

  // résultats : recherche globale ou catégorie courante
  let rows;
  if (q.trim()) {
    const nq = norm(q);
    rows = [];
    cats.forEach(c => listFor(c).forEach(name => { if (norm(name).includes(nq)) rows.push({ name, cat:c }); }));
    rows = rows.slice(0, 40);
  } else {
    rows = listFor(cat).map(name => ({ name, cat }));
  }

  const create = ()=>{
    if (!fName.trim()) return;
    const spec = { name:fName.trim(), group:fCat, setsN:fSets, reps:fReps, weight: fBw?0:fW, unit: fBw?'reps':'kg', bw:fBw, rest:90 };
    onCreate && onCreate(spec);
    onPick(spec);
  };

  return (
    <Sheet title={title} accent={accent} onClose={onClose}>
      {!creating ? (<>
        {/* recherche */}
        <div className="row" style={{ gap:8, marginBottom:10 }}>
          <div className="row grow" style={{ gap:8, background:'var(--surface)', border:'1px solid var(--line2)', borderRadius:13, padding:'0 12px', height:44 }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" strokeLinecap="round"/></svg>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher (smith, poulie, presse…)"
              style={{ flex:1, background:'none', border:'none', outline:'none', color:'var(--fg)', font:'inherit', fontSize:14.5 }} />
            {q && <button className="tap" onClick={()=>setQ('')} style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer' }}><Icon n="x" s={16}/></button>}
          </div>
        </div>

        {/* créer — bien visible, en haut */}
        <button className="btn btn-acc" style={{ height:46, fontSize:14, marginBottom:12 }}
          onClick={()=>{ setFName(q); setFCat(q.trim()?startCat:cat); setCreating(true); }}>
          <Icon n="plus" s={18} c="var(--on-acc)"/> Créer un exercice absent de la liste</button>

        {/* catégories — toutes visibles (wrap) */}
        {!q.trim() && <div style={{ display:'flex', flexWrap:'wrap', gap:7, paddingBottom:10 }}>
          {cats.map(c => (
            <button key={c} className={'chip tap '+(c===cat?'acc':'ghost')} style={{ flex:'0 0 auto', height:30 }} onClick={()=>setCat(c)}>{c}</button>
          ))}
        </div>}

        {/* liste */}
        <div className="col" style={{ gap:8, maxHeight:264, overflowY:'auto', margin:'0 -2px', padding:'2px' }}>
          {rows.map((r,i) => (
            <button key={r.name+i} className="sp-row tap" style={{ width:'100%', textAlign:'left' }} onClick={()=>onPick(specFrom(r.name, r.cat))}>
              <span className="bar"/>
              <div className="col grow" style={{ gap:2 }}>
                <span className="nm" style={{ fontSize:13.5 }}>{r.name}</span>
                {q.trim() && <span className="muted" style={{ fontSize:10.5, letterSpacing:.5 }}>{r.cat}</span>}
              </div>
              <Icon n={mode==='replace'?'swap':'plus'} s={16} c="var(--muted)"/>
            </button>
          ))}
          {rows.length===0 && <div className="muted" style={{ fontSize:13, textAlign:'center', padding:'18px 0' }}>Aucun résultat — utilise « Créer un exercice » ci-dessus.</div>}
        </div>
      </>) : (<>
        {/* création */}
        <div className="col" style={{ gap:14 }}>
          <div className="col" style={{ gap:7 }}><span className="lbl">Nom</span>
            <input value={fName} onChange={e=>setFName(e.target.value)} autoFocus placeholder="ex. Tirage poitrine prise neutre"
              style={{ background:'var(--surface)', border:'1.5px solid var(--line2)', borderRadius:13, padding:13, color:'var(--fg)', font:'inherit', fontSize:14.5, outline:'none' }}/></div>
          <div className="col" style={{ gap:7 }}><span className="lbl">Catégorie</span>
            <div style={{ display:'flex', flexWrap:'wrap', gap:7 }}>
              {GYM.CATS.map(c=><button key={c} className={'chip tap '+(c===fCat?'acc':'ghost')} style={{ flex:'0 0 auto', height:30 }} onClick={()=>setFCat(c)}>{c}</button>)}
            </div></div>
          <div className="row" style={{ gap:12 }}>
            <div className="col" style={{ gap:7 }}><span className="lbl">Séries</span><Stepper value={fSets} step={1} min={1} onChange={setFSets}/></div>
            <div className="col" style={{ gap:7 }}><span className="lbl">Reps</span><Stepper value={fReps} step={1} min={1} onChange={setFReps}/></div>
          </div>
          <div className="between">
            <span className="lbl">Poids du corps</span>
            <button className={'check '+(fBw?'on':'')} onClick={()=>setFBw(!fBw)}>{fBw && <Icon n="check" s={15} w={3.2} c="var(--on-acc)"/>}</button>
          </div>
          {!fBw && <div className="col" style={{ gap:7 }}><span className="lbl">Charge de départ</span><Stepper value={fW} step={2.5} min={0} onChange={setFW} suffix="kg"/></div>}
          <div className="row" style={{ gap:10, marginTop:4 }}>
            <button className="btn btn-line grow" onClick={()=>setCreating(false)}>Annuler</button>
            <button className="btn btn-acc grow" style={{ opacity: fName.trim()?1:.5 }} onClick={create}>Ajouter l’exercice</button>
          </div>
        </div>
      </>)}
    </Sheet>
  );
}
window.ExercisePicker = ExercisePicker;

</script>
<script type="text/babel" data-presets="react">
/* Screens: Home (Focus + n° semaine) · Session (Spectrum) · Track (saisie adaptable) */

function dayLabelFR(key){ const m={lun:'Lundi',mar:'Mardi',mer:'Mercredi',jeu:'Jeudi',ven:'Vendredi',a:'Jour A',b:'Jour B'}; return m[key]||key; }

/* ---- Bloc note de séance (cloche) — éditable, par jour + programme ---- */
function DayNote({ ctx, dayKey }) {
  const key = ctx.activeProgramId + ':' + dayKey;
  const fallback = (ctx.program.note && ctx.program.note.day===dayKey) ? ctx.program.note.text : null;
  const stored = ctx.dayNotes[key];
  const note = stored !== undefined ? (stored || null) : fallback;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState('');
  const open  = ()=>{ setDraft(note||''); setEditing(true); };
  const save  = ()=>{ ctx.setDayNote(key, draft.trim()); setEditing(false); };
  const clear = ()=>{ ctx.setDayNote(key, ''); setEditing(false); };
  return (<>
    {note
      ? <div className="row card tap" onClick={open}
          style={{ padding:'12px 14px', gap:10, alignItems:'flex-start', cursor:'pointer',
            borderColor:'color-mix(in srgb,var(--d-vac) 30%,transparent)',
            background:'color-mix(in srgb,var(--d-vac) 10%,transparent)' }}>
          <Icon n="bell" s={18} c="var(--d-vac)"/>
          <span style={{ flex:1, fontSize:12.5, lineHeight:1.45 }} className="fg2">{note}</span>
          <Icon n="edit" s={15} c="var(--muted)"/>
        </div>
      : <button className="row tap" onClick={open}
          style={{ background:'none', border:'none', cursor:'pointer', color:'var(--muted)',
            fontSize:12, fontWeight:600, gap:6, padding:'4px 0', alignSelf:'flex-start' }}>
          <Icon n="bell" s={14} c="var(--muted)"/><span>Ajouter une note de séance</span>
        </button>}
    {editing && <Sheet title="Note de séance" onClose={()=>setEditing(false)}>
      <div className="muted" style={{ fontSize:12, marginBottom:12 }}>{dayLabelFR(dayKey)} · visible sur l'accueil à chaque séance.</div>
      <textarea value={draft} onChange={e=>setDraft(e.target.value)} autoFocus
        placeholder="ex. Si réveil nocturne persiste → déplacer les abdos au mercredi…"
        style={{ width:'100%', minHeight:110, background:'var(--surface)', border:'1.5px solid var(--line2)',
          borderRadius:14, padding:14, color:'var(--fg)', font:'inherit', fontSize:14.5,
          resize:'none', outline:'none', boxSizing:'border-box' }}/>
      <div className="row" style={{ gap:10, marginTop:14 }}>
        <button className="btn btn-line grow" style={{ color:'var(--d-ven)', borderColor:'color-mix(in srgb,var(--d-ven) 30%,transparent)' }}
          onClick={clear}><Icon n="x" s={16}/> Effacer</button>
        <button className="btn btn-acc grow" onClick={save}><Icon n="check" s={16} c="var(--on-acc)"/> Enregistrer</button>
      </div>
    </Sheet>}
  </>);
}

/* ---------------- HOME — Focus, today-centric, week number ---------------- */
function HomeScreen({ ctx }) {
  const { program, today, weekNo, dayColor, push, switchProgram, activeProgramId, sessionProgress } = ctx;
  const dayKeys = Object.keys(program.days);
  const td = program.days[today];
  const prog = sessionProgress(today);

  return (
    <div className="screen" style={{ '--acc': dayColor(today) }}>
      <div className="safe-top" />
      <div className="pad col" style={{ gap: 18 }}>
        <div className="between">
          <span className="kicker">{program.name.split('—')[0].trim().toUpperCase()} · SEMAINE {weekNo}/{program.weeks}</span>
          <div className="seg" style={{ width: 158 }}>
            <button className={activeProgramId!=='vacances'?'on':''} onClick={()=>switchProgram('phase1')}>Programme</button>
            <button className={activeProgramId==='vacances'?'on':''} onClick={()=>switchProgram('vacances')}>Vacances</button>
          </div>
        </div>

        {/* day strip */}
        <div className="row" style={{ gap: 9, justifyContent:'space-between' }}>
          {dayKeys.map(k => {
            const on = k===today;
            return (<button key={k} className="col tap" onClick={()=>push('session',{dayKey:k})}
              style={{ alignItems:'center', gap:6, background:'none', border:'none', cursor:'pointer', flex:1 }}>
              <span style={{ width:38, height:38, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                border:'2px solid '+(on?dayColor(k):'var(--line2)'), color:on?dayColor(k):'var(--muted)', fontWeight:700, fontSize:13 }}>
                {(program.days[k].focus||k)[0]}</span>
              <span style={{ fontSize:9, fontWeight:700, letterSpacing:.5, color:on?'var(--fg)':'var(--muted)' }}>
                {program.id==='vacances'? k.toUpperCase() : GYM.DAYS.find(d=>d.id===k).short}</span>
            </button>);
          })}
        </div>

        {/* today hero */}
        <div className="col" style={{ gap:6, marginTop:6 }}>
          <span className="kicker" style={{ color:'var(--acc)' }}>Aujourd’hui · {dayLabelFR(today)} 4 juin</span>
          <h1 className="h1" style={{ fontSize:40 }}>{td.focus}</h1>
        </div>

        <div className="row" style={{ gap:10 }}>
          <div className="card pad" style={{ flex:1, padding:'13px 15px' }}>
            <div className="stat-big" style={{ fontSize:26 }}>{td.exercises.length}</div>
            <div className="kicker">exercices</div>
          </div>
          <div className="card" style={{ flex:1, padding:'13px 15px' }}>
            <div className="stat-big num" style={{ fontSize:26 }}>~{Math.round(td.exercises.reduce((s,e)=>s+e.setsN*(e.rest+40),0)/60)}'</div>
            <div className="kicker">durée est.</div>
          </div>
          <div className="card" style={{ flex:1, padding:'13px 15px' }}>
            <div className="stat-big num" style={{ fontSize:26, color: prog.done>0?'var(--acc)':'var(--fg)' }}>{prog.done}/{prog.total}</div>
            <div className="kicker">séries</div>
          </div>
        </div>

        <button className="btn btn-acc" onClick={()=>push('session',{dayKey:today})}>
          <Icon n={prog.done>0?'play':'play'} s={20} c="var(--on-acc)"/>{prog.done>0?'Reprendre la séance':'Démarrer la séance'}</button>

        <DayNote ctx={ctx} dayKey={today} />
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

/* ---------------- SESSION — Spectrum exercise list ---------------- */
function SessionScreen({ ctx, params }) {
  const { program, weekNo, dayColor, push, pop, sessionProgress, getSets } = ctx;
  const dayKey = params.dayKey;
  const day = program.days[dayKey];
  const prog = sessionProgress(dayKey);
  const acc = dayColor(dayKey);

  return (
    <div className="screen" style={{ '--acc': acc }}>
      <div className="sp-head">
        <div style={{ position:'absolute', top:54, left:16 }}>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={pop}><Icon n="back" s={20}/></button>
        </div>
        <div style={{ position:'absolute', top:54, right:16 }}>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={()=>push('programEdit',{programId:program.id})}><Icon n="sliders" s={18}/></button>
        </div>
        <div className="hk">{dayLabelFR(dayKey).toUpperCase()} · SEMAINE {weekNo}</div>
        <div className="ht">{day.focus}</div>
        <div className="hpills">
          <span className="hpill">{day.exercises.length} exercices</span>
          <span className="hpill">{prog.done}/{prog.total} séries</span>
        </div>
      </div>

      <div className="pad col" style={{ gap:9, marginTop:14 }}>
        {day.exercises.map((e,i)=>{
          const sets = getSets(dayKey, e);
          const done = sets.filter(s=>s.done).length;
          const complete = done===sets.length;
          return (<div key={e.id} className="sp-row tap" onClick={()=>push('track',{dayKey, exIndex:i})}>
            <span className="bar" style={{ opacity: complete?1:(done?.6:.28) }}/>
            <div className="col grow" style={{ gap:5 }}>
              <span className="nm">{e.name}</span>
              <div className="row" style={{ gap:7, flexWrap:'wrap' }}>
                <span className="muted num" style={{ fontSize:12 }}>{e.setsN}×{e.reps}</span>
                <span className="muted">·</span>
                <span className="num" style={{ fontSize:12, fontWeight:600 }}>{e.bw?'PdC':GYM.fmtKg(e.weight)+' '+e.unit}</span>
                {e.target && <span className="chip good" style={{ height:20, fontSize:10.5 }}><Icon n="target" s={11} c="var(--good)"/>{GYM.fmtKg(e.target)}</span>}
              </div>
              {e.superName && <div className="row" style={{ gap:6, marginTop:1 }}>
                <Icon n="link" s={12} c="var(--acc)"/>
                <span className="num" style={{ fontSize:11.5, color:'var(--acc)', fontWeight:600 }}>{e.superName}</span>
                <span className="muted num" style={{ fontSize:11 }}>· {e.setsN}×{e.superReps||10}{e.superBw?'':' · '+GYM.fmtKg(e.superWeight||0)+' kg'}</span>
              </div>}
            </div>
            <div className="col" style={{ alignItems:'flex-end', gap:6 }}>
              {complete ? <span className="check on"><Icon n="check" s={15} w={3.2} c="var(--on-acc)"/></span>
                : <span className="num" style={{ fontSize:12, color: done?'var(--acc)':'var(--muted)', fontWeight:700 }}>{done}/{sets.length}</span>}
              <Icon n="fwd" s={16} c="var(--muted)"/>
            </div>
          </div>);
        })}
      </div>
      <div className="scroll-pad" />
    </div>
  );
}

/* ---------------- TRACK — saisie adaptable série par série ---------------- */
function TrackScreen({ ctx, params }) {
  const { program, dayColor, push, pop, getSets, setSets, startTimer } = ctx;
  const dayKey = params.dayKey;
  const day = program.days[dayKey];
  const exIndex = params.exIndex;
  const e = day.exercises[exIndex];
  const acc = dayColor(dayKey);

  const [sets, setLocal] = React.useState(()=>getSets(dayKey, e).map(s=>({...s})));
  const firstOpen = sets.findIndex(s=>!s.done);
  const [active, setActive] = React.useState(firstOpen<0?sets.length-1:firstOpen);
  const [swap, setSwap] = React.useState(false);

  const commit = (next)=>{ setLocal(next); setSets(dayKey, e, next); };
  const editSet = (i, patch)=>{ const n=sets.map((s,idx)=>idx===i?{...s,...patch}:s); commit(n); };
  const validate = (i)=>{
    const n = sets.map((s,idx)=>idx===i?{...s,done:true}:s); commit(n);
    if (!e.bw) startTimer(e.rest, e.name+' · série '+(i+2<=sets.length? (i+2):'fin'), acc, e.id);
    else startTimer(e.rest, e.name, acc, e.id);
    const nextIdx = n.findIndex((s,idx)=>idx>i && !s.done);
    if (nextIdx>=0) setActive(nextIdx); else setActive(-1);
  };
  const doneCount = sets.filter(s=>s.done).length;
  const allDone = doneCount===sets.length;
  const nextExist = exIndex < day.exercises.length-1;

  return (
    <div className="screen" style={{ '--acc': acc }}>
      <div className="sp-head" style={{ paddingBottom:18 }}>
        <div style={{ position:'absolute', top:54, left:16 }}>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={pop}><Icon n="back" s={20}/></button>
        </div>
        <div style={{ position:'absolute', top:54, right:16, display:'flex', gap:8 }}>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={()=>push('historyEx',{exId:'squat',name:e.name})}><Icon n="clock" s={18}/></button>
          <button className="icon-btn" style={{ background:'rgba(0,0,0,.13)', color:'var(--on-acc)' }} onClick={()=>setSwap(true)}><Icon n="swap" s={18}/></button>
        </div>
        <div className="hk">EXERCICE {exIndex+1} / {day.exercises.length}</div>
        <div className="ht">{e.name}</div>
        <div className="hpills">
          <span className="hpill">{e.setsN}×{e.reps}</span>
          {e.superName && <span className="hpill" style={{ display:'inline-flex', alignItems:'center', gap:4 }}>⊃ {e.superName}</span>}
          <span className="hpill">dernière · {e.last}</span>
          {e.target && <span className="hpill" style={{ background:'rgba(10,11,13,.82)', color:'var(--good)' }}>↗ obj. {GYM.fmtKg(e.target)}</span>}
        </div>
      </div>

      <div className="pad col" style={{ gap:8, marginTop:14 }}>
        {sets.map((s,i)=>{
          if (i===active) {
            return (<div key={i} className="card" style={{ padding:16, boxShadow:'0 0 0 1.5px var(--acc)' }}>
              <div className="between"><span className="lbl" style={{ color:'var(--acc)' }}>Série {i+1} / {sets.length}</span>
                <span className="chip">der. {e.last}</span></div>
              {!e.bw && <div className="col" style={{ gap:8, marginTop:14 }}>
                <span className="kicker">Charge</span>
                <div className="between">
                  <Stepper value={s.w} step={2.5} onChange={v=>editSet(i,{w:v})} suffix={e.unit}/>
                  <div className="row" style={{ gap:6 }}>
                    {e.target && <button className="chip acc" onClick={()=>editSet(i,{w:e.target})}>obj. {GYM.fmtKg(e.target)}</button>}
                  </div>
                </div>
              </div>}
              <div className="col" style={{ gap:8, marginTop:14 }}>
                <span className="kicker">Répétitions {e.bw?'':'· prévu '+e.reps}</span>
                <div className="row" style={{ gap:10 }}>
                  <Stepper value={s.reps} step={1} onChange={v=>editSet(i,{reps:v})} suffix={e.unit==='s'?'s':'reps'}/>
                  {s.reps<e.reps && <span className="chip" style={{ color:'var(--d-ven)' }}>−{e.reps-s.reps} vs prévu</span>}
                </div>
              </div>
              {e.superName && <div className="col" style={{ gap:10, marginTop:14, paddingTop:14, borderTop:'1px dashed var(--line2)' }}>
                <div className="row" style={{ gap:7 }}><Icon n="link" s={15} c="var(--acc)"/><span className="kicker" style={{ color:'var(--acc)' }}>Superset · {e.superName}</span></div>
                <div className="row" style={{ gap:10 }}>
                  {!e.superBw && <Stepper value={s.sW!=null?s.sW:e.superWeight} step={2.5} onChange={v=>editSet(i,{sW:v})} suffix="kg"/>}
                  <Stepper value={s.sReps!=null?s.sReps:e.superReps} step={1} onChange={v=>editSet(i,{sReps:v})} suffix="reps"/>
                </div>
              </div>}
              <button className="btn btn-acc" style={{ marginTop:16 }} onClick={()=>validate(i)}>
                <Icon n="check" s={20} c="var(--on-acc)"/> Valider · repos {e.rest}s</button>
            </div>);
          }
          return (<div key={i} role="button" tabIndex={0} className="sp-row tap" onClick={()=>setActive(i)} style={{ width:'100%', textAlign:'left' }}>
            <Check on={s.done} onClick={(ev)=>{ev.stopPropagation(); editSet(i,{done:!s.done});}}/>
            <div className="col grow" style={{ gap:2 }}>
              <span className="nm" style={{ fontSize:13.5 }}>Série {i+1}</span>
              {e.superName && <span className="muted num" style={{ fontSize:10.5 }}>{e.superName} · {s.sReps!=null?s.sReps:e.superReps}{e.superBw?' reps':'×'+GYM.fmtKg(s.sW!=null?s.sW:e.superWeight)}</span>}
            </div>
            <span className="num muted" style={{ fontSize:13 }}>{s.reps} reps</span>
            <span className="num v" style={{ fontSize:14, color: s.done?'var(--fg)':'var(--muted)' }}>{e.bw?'PdC':GYM.fmtKg(s.w)+' kg'}</span>
          </div>);
        })}

        {allDone &&
          <div className="card" style={{ padding:16, marginTop:4, textAlign:'center', borderColor:'var(--acc)' }}>
            <div className="h2" style={{ color:'var(--acc)' }}>Exercice terminé ✓</div>
            <div className="muted" style={{ fontSize:12.5, marginTop:4 }}>Volume : <span className="num">{GYM.fmtInt(sets.reduce((a,x)=> a + (e.bw?0:(x.reps||0)*(x.w||0)) + (e.superName?((x.sReps!=null?x.sReps:e.superReps)||0)*((x.sW!=null?x.sW:e.superWeight)||0):0), 0))} kg</span></div>
            <button className="btn btn-acc" style={{ marginTop:14 }} onClick={()=> nextExist ? push('track',{dayKey, exIndex:exIndex+1}, true) : pop()}>
              {nextExist? 'Exercice suivant' : 'Retour à la séance'} <Icon n="fwd" s={18} c="var(--on-acc)"/></button>
          </div>}
      </div>
      <div className="scroll-pad" />

      {swap && <ExercisePicker title="Remplacer l’exercice" mode="replace" accent={acc} defaultGroup={day.group}
        customCatalog={ctx.customCatalog} onCreate={ctx.addCustomExercise}
        onPick={(spec)=>{ ctx.replaceExercise(program.id, dayKey, exIndex, spec.name); setSwap(false); }}
        onClose={()=>setSwap(false)} />}
    </div>
  );
}

Object.assign(window, { HomeScreen, SessionScreen, TrackScreen, dayLabelFR });

</script>
<script type="text/babel" data-presets="react">

            <button className="btn" style={{ width:64, height:52, borderRadius:14, background:'#0A0B0D', color:'#fff' }} onClick={ctx.timerCtrl.togglePause}><Icon n={t.paused?'play':'pause'} s={20} c="#fff"/></button>
            <button className="btn" style={{ flex:1, height:52, borderRadius:14, background:'rgba(0,0,0,.13)', color:'var(--on-acc)', fontWeight:700, fontSize:15 }} onClick={()=>ctx.timerCtrl.addTime(30)}>+30 s</button>
          </div>
          <div className="row" style={{ justifyContent:'space-between', background:'#0A0B0D', color:'#F4F5F7', borderRadius:14, padding:'13px 16px' }}>
            <span style={{ fontSize:12.5, fontWeight:600 }}>Ensuite · {t.label}</span>
            <button className="btn" style={{ background:'none', color:'var(--acc)', fontWeight:700, fontSize:13, gap:4 }} onClick={ctx.timerCtrl.stop}>Passer <Icon n="fwd" s={15} c="var(--acc)"/></button>
          </div>
        </>) : (
          <button className="btn" style={{ height:56, borderRadius:16, background:'#0A0B0D', color:'#fff', fontFamily:'var(--font-disp)', fontWeight:800, fontSize:16 }} onClick={ctx.timerCtrl.stop}>C’est reparti</button>
        )}
        <div className="on-acc-soft" style={{ textAlign:'center', fontSize:11.5, fontWeight:600 }}>
          Tu peux réduire ↓ et naviguer — le minuteur continue.</div>
      </div>

  );
}
window.TimerScreen = TimerScreen;
